<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrailView — Trail Detail</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css"/>
<link rel="stylesheet" href="src/css/style.css">
<link rel="stylesheet" href="src/css/detailed.css">
<script type="module" defer src="src/js/detailed.js"></script>
</head>
<body>
  <header>
    <a href="index.html" class="brand-mark" aria-label="TrailView home">
      <svg
        viewBox="0 0 24 24"
        fill="none"
        xmlns="http://www.w3.org/2000/svg"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        aria-hidden="true"
        focusable="false">
        <path d="M3 20l6-14 3 7 2-4 7 11z"/>
      </svg>
      TrailView
    </a>

    <nav aria-label="Primary navigation">
      <a href="index.html" aria-current="page">Home</a>
      <a href="index.html#explore">Explore</a>
      <a href="index.html#plan-hike-title">Plan</a>
    </nav>
  </header>

  <main>
    <a class="back-button" href="index.html" aria-label="Go back to trails">
      ← Back to trails
    </a>

    <div
      class="trail-summary"
      aria-live="polite"
      aria-busy="true">
      <!-- Populated dynamically -->
    </div>

    <div
      class="photo-frame"
      aria-live="polite"
      aria-busy="true">
      <!-- Populated dynamically -->
    </div>

    <div
      class="card"
      aria-live="polite"
      aria-busy="true">
      <!-- Populated dynamically -->
    </div>
  </main>

  <footer>
    © 2026 TrailView. All rights reserved.
  </footer>

</body>
</html>
