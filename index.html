<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="author" content="Rychen Jones">
<meta name="description" content="A class project to explore hikes in the USA and make a plan to go">
<title>TrailView — Plan Your Hike</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css"/>
<link rel="stylesheet" href="src/css/style.css">
<link rel="stylesheet" href="src/css/index.css">
<script type="module" defer src="src/js/main.js"></script>
</head>
<body>

  <div class="topo-bg" aria-hidden="true">
    <svg viewBox="0 0 430 340" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false">
      <path d="M-10 60 Q 100 20, 220 60 T 440 50" stroke="#1f3d2c" fill="none" stroke-width="2"/>
      <path d="M-10 100 Q 90 60, 220 100 T 440 90" stroke="#1f3d2c" fill="none" stroke-width="2"/>
      <path d="M-10 140 Q 110 100, 220 140 T 440 130" stroke="#1f3d2c" fill="none" stroke-width="2"/>
      <path d="M-10 180 Q 130 150, 220 180 T 440 175" stroke="#1f3d2c" fill="none" stroke-width="2"/>
      <path d="M-10 220 Q 140 195, 220 220 T 440 218" stroke="#1f3d2c" fill="none" stroke-width="2"/>
      <path d="M-10 260 Q 150 240, 220 260 T 440 258" stroke="#1f3d2c" fill="none" stroke-width="2"/>
    </svg>
  </div>

  <header>
    <div class="brand-mark">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
        <path d="M3 20l6-14 3 7 2-4 7 11z"/>
      </svg>
      TrailView
    </div>

    <nav aria-label="Primary">
      <a href="index.html" aria-current="page">Home</a>
      <a href="#explore">Explore</a>
      <a href="#plan-hike-title">Plan</a>
    </nav>
  </header>

  <main>

    <section class="hero" aria-labelledby="hero-title">
      <h1 id="hero-title">Trail<span>View</span></h1>
      <p>Find it. Hike it. Log it.</p>
    </section>

    <div class="trail-divider" aria-hidden="true">
      <div class="dash-line"></div>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
        <path d="M3 20l6-14 3 7 2-4 7 11z"/>
      </svg>
      <div class="dash-line"></div>
    </div>

    <form class="card" aria-labelledby="plan-hike-title">
      <div class="card-title">
        <h2 id="plan-hike-title">Plan Your Hike</h2>
      </div>

      <p class="form-intro">
        Tell us where you're headed and we'll keep your route on file.
      </p>

      <div class="form-field">
        <label for="name">Name</label>
        <input
          id="name"
          name="name"
          type="text"
          placeholder="Jordan Rivers"
          autocomplete="name"
          maxlength="99"
          required
          aria-required="true"
          aria-describedby="name-error"
        >
        <p class="field-error" id="name-error" aria-live="polite"></p>
      </div>

      <div class="form-field">
        <label for="email">Email</label>
        <input
          id="email"
          name="email"
          type="email"
          placeholder="jordan@example.com"
          autocomplete="email"
          required
          aria-required="true"
          aria-describedby="email-error"
        >
        <p class="field-error" id="email-error" aria-live="polite"></p>
      </div>

      <div class="form-field">
        <label for="trail">Trail</label>
        <select
          id="trail"
          name="trail"
          required
          aria-required="true"
          aria-describedby="trail-error"
        >
          <!-- Dynamically loaded -->
        </select>
        <p class="field-error" id="trail-error" aria-live="polite"></p>
      </div>

      <div class="form-field">
        <label for="notes">Notes (optional)</label>
        <textarea
          id="notes"
          name="notes"
          placeholder="Starting time, group size, gear notes…"
          maxlength="499"
          aria-describedby="notes-error"
        ></textarea>
        <p class="field-error" id="notes-error" aria-live="polite"></p>
      </div>

      <button type="submit" class="btn-blaze">
        Save My Hike Plan
      </button>
    </form>

    <section id="explore" aria-labelledby="explore-heading">
      <div class="explore-header">
        <h2 id="explore-heading">Explore</h2>

        <div class="filter-select">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
            <path d="M4 6h16M7 12h10M10 18h4"/>
          </svg>

          <select id="filter-trails" aria-label="Filter trails">
            <option value="all">Filter</option>
            <option value="favorites">Favorites</option>
            <option value="easy">Easy</option>
            <option value="moderate">Moderate</option>
            <option value="hard">Hard</option>
          </select>
        </div>
      </div>

      <div
        class="trail-list"
        aria-live="polite"
        aria-atomic="true"
        aria-label="Trail results"
      >
        <p id="placeholder-text">No trails to show at this time.</p>
        <!-- Dynamically loaded -->
      </div>
    </section>

  </main>

  <footer>© 2026 TrailView. All rights reserved.</footer>
</body>
</html>
